<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DRUNFM | 24/7</title>
    <style>
        :root { --neon: #bd00ff; }
        body { 
            margin: 0; height: 100vh; overflow: hidden;
            background: radial-gradient(circle at center, #2e004d 0%, #050505 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Inter', sans-serif; color: white;
        }

        /* Объекты на фоне (глубина) */
        .bg-layer { position: absolute; width: 100%; height: 100%; z-index: -1; }
        .circle { 
            position: absolute; border-radius: 50%; filter: blur(80px);
            background: var(--neon); opacity: 0.2; animation: float 10s infinite;
        }

        .card { 
            background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 280px; box-shadow: 0 0 50px rgba(189,0,255,0.3);
        }

        #playBtn { 
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: #fff; color: var(--neon); font-size: 24px; 
            cursor: pointer; transition: 0.3s; margin-bottom: 20px;
        }
        #playBtn:hover { transform: scale(1.1); box-shadow: 0 0 20px #fff; }

        input[type=range] { width: 100%; accent-color: var(--neon); cursor: pointer; }
        
        @keyframes float { 0% { transform: translateY(0); } 50% { transform: translateY(-50px); } }
    </style>
</head>
<body>

<div class="bg-layer">
    <div class="circle" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
    <div class="circle" style="width: 300px; height: 300px; bottom: -50px; right: -50px;"></div>
</div>

<div class="card">
    <h2 style="margin: 0; color: var(--neon); letter-spacing: 3px;">DRUNFM</h2>
    <div id="status" style="font-size: 12px; margin-bottom: 20px; opacity: 0.7;">READY</div>
    <button id="playBtn">▶</button>
    <input type="range" id="vol" min="0" max="100" value="80">
    <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    const btn = document.getElementById('playBtn');
    const status = document.getElementById('status');

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'eZJx14UhktY',
            playerVars: { 'playsinline': 1 },
            events: {
                'onReady': () => {
                    btn.onclick = () => {
                        // Агрессивное включение
                        player.unMute();
                        player.playVideo();
                        status.innerText = "LIVE 24/7";
                        btn.innerText = "⏸";
                        btn.onclick = () => {
                            if(player.getPlayerState() === 1) { player.pauseVideo(); btn.innerText = "▶"; }
                            else { player.playVideo(); btn.innerText = "⏸"; }
                        };
                    };
                    document.getElementById('vol').oninput = (e) => player.setVolume(e.target.value);
                }
            }
        });
    }
</script>
</body>
</html>
