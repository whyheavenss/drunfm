<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>DRUNFM | Control Center</title>
    <style>
        :root { --neon: #bd00ff; --glass: rgba(255, 255, 255, 0.1); }
        
        body { 
            margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle, #2e004d 0%, #050505 100%);
            font-family: 'Segoe UI', sans-serif; color: white; overflow: hidden;
        }

        /* Анимация фона */
        .bg-glow {
            position: absolute; width: 600px; height: 600px;
            background: var(--neon); filter: blur(150px); opacity: 0.15;
            animation: move 10s infinite alternate; z-index: -1;
        }

        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }

        .ui-card { 
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
            text-align: center; width: 300px; box-shadow: 0 0 40px rgba(189,0,255,0.2);
        }

        #playBtn { 
            width: 80px; height: 80px; border-radius: 50%; border: none;
            background: white; color: var(--neon); font-size: 30px; cursor: pointer;
            margin-bottom: 20px; transition: 0.3s;
        }
        #playBtn:hover { transform: scale(1.1); box-shadow: 0 0 20px white; }

        input[type=range] { 
            width: 100%; margin-top: 20px; accent-color: var(--neon); cursor: pointer;
        }
        
        #status { font-weight: bold; text-transform: uppercase; margin-bottom: 10px; color: var(--neon); }
        #player { display: none; }
    </style>
</head>
<body>

<div class="bg-glow"></div>

<div class="ui-card">
    <div id="status">RADIO OFF</div>
    <button id="playBtn">▶</button>
    <div style="font-size: 12px; color: #888;">VOLUME</div>
    <input type="range" id="volRange" min="0" max="100" value="80">
    <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    const btn = document.getElementById('playBtn');
    const status = document.getElementById('status');

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'eZJx14UhktY',
            events: { 
                'onReady': () => {
                    document.getElementById('volRange').addEventListener('input', (e) => player.setVolume(e.target.value));
                    btn.addEventListener('click', toggle);
                }
            }
        });
    }

    function toggle() {
        if (player.getPlayerState() === 1) {
            player.pauseVideo();
            btn.innerText = "▶";
            status.innerText = "RADIO OFF";
        } else {
            player.playVideo();
            btn.innerText = "⏸";
            status.innerText = "LIVE 24/7";
        }
    }
</script>
</body>
</html>
