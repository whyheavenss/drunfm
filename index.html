<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUNFM | Live Radio</title>
    <style>
        body { margin: 0; background: #080808; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .container { text-align: center; background: #1a1a1a; padding: 40px; border-radius: 30px; border: 1px solid #333; box-shadow: 0 0 30px rgba(255, 0, 0, 0.2); }
        h1 { margin-bottom: 20px; color: #fff; }
        #playBtn { padding: 20px 50px; font-size: 18px; cursor: pointer; background: #ff0000; border: none; color: white; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        #playBtn:hover { transform: scale(1.05); background: #d00000; }
        #player { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>DRUNFM LIVE</h1>
    <button id="playBtn">ВКЛЮЧИТЬ ЭФИР</button>
    <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    const btn = document.getElementById('playBtn');

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'eZJx14UhktY',
            playerVars: { 'autoplay': 1, 'controls': 0 },
            events: {
                'onReady': () => {
                    btn.addEventListener('click', () => {
                        player.playVideo();
                        btn.innerText = "ИГРАЕТ...";
                        btn.style.background = "#222";
                    });
                }
            }
        });
    }
</script>
</body>
</html>
