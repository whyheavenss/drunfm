<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DRUNFM | Live Radio</title>
    <style>
        :root { --accent: #ff0000; --bg: #0a0a0a; }
        body { margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; color: white; }
        .card { background: #161616; padding: 2rem; border-radius: 24px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.5); width: 320px; border: 1px solid #333; }
        h1 { font-size: 1.5rem; margin-bottom: 20px; letter-spacing: 2px; }
        #playBtn { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; border: none; color: white; font-weight: bold; cursor: pointer; transition: transform 0.2s; }
        #playBtn:active { transform: scale(0.9); }
        #status { margin-top: 15px; color: #888; font-size: 0.9rem; }
        #player { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>DRUNFM LIVE</h1>
    <button id="playBtn">PLAY</button>
    <div id="status">Нажми, чтобы слушать</div>
    <div id="player"></div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
    let player;
    const btn = document.getElementById('playBtn');
    const status = document.getElementById('status');

    function onYouTubeIframeAPIReady() {
        player = new YT.Player('player', {
            videoId: 'eZJx14UhktY',
            events: {
                'onReady': () => {
                    btn.addEventListener('click', () => {
                        if (player.getPlayerState() === 1) {
                            player.pauseVideo();
                            btn.innerText = "PLAY";
                            status.innerText = "На паузе";
                        } else {
                            player.playVideo();
                            btn.innerText = "PAUSE";
                            status.innerText = "Эфир в прямом эфире...";
                        }
                    });
                },
                'onError': () => status.innerText = "Ошибка стрима (ограничение автора)"
            }
        });
    }
</script>
</body>
</html>
