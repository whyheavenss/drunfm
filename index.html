<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
        body { 
            margin: 0; background: #050505; color: white; 
            font-family: 'Inter', sans-serif; display: flex; 
            align-items: center; justify-content: center; height: 100vh;
        }
        .radio-card { 
            background: #111; padding: 40px; border-radius: 30px; 
            text-align: center; border: 1px solid #222;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.15); width: 300px;
        }
        .pulse { 
            width: 80px; height: 80px; background: #ff0000; 
            border-radius: 50%; margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .pulse:hover { transform: scale(1.1); box-shadow: 0 0 20px #ff0000; }
        input[type=range] { width: 100%; margin-top: 20px; accent-color: #ff0000; }
    </style>
</head>
<body>

<div class="radio-card">
    <div class="pulse" onclick="togglePlay()">▶</div>
    <h2 id="status">DRUNFM</h2>
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1" oninput="setVolume(this.value)">
    
    <!-- Используем прокси-поток, который обходит ограничения YouTube -->
    <audio id="audioPlayer">
        <source src="https://yt.lemnoslife.com/audio/eZJx14UhktY" type="audio/mpeg">
    </audio>
</div>

<script>
    const audio = document.getElementById('audioPlayer');
    const status = document.getElementById('status');
    
    function togglePlay() {
        if (audio.paused) {
            audio.play();
            status.innerText = "LIVE NOW";
        } else {
            audio.pause();
            status.innerText = "PAUSED";
        }
    }
    function setVolume(val) { audio.volume = val; }
</script>
</body>
</html>
